name: Build Windows Executable

on:
  release:
    types: [created]
  workflow_dispatch:       # permite rodar manualmente pela UI do GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller VisionLOL.spec

      - name: Verify output
        run: |
          if (Test-Path "dist/VisionLOL.exe") {
            $size = (Get-Item "dist/VisionLOL.exe").length / 1MB
            Write-Host "VisionLOL.exe gerado com sucesso — $([math]::Round($size,1)) MB"
          } else {
            Write-Error "Build falhou: VisionLOL.exe não encontrado"
            exit 1
          }

      - name: Upload .exe como asset da release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VisionLOL.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artefato (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: VisionLOL-exe
          path: dist/VisionLOL.exe
          retention-days: 7

  build-agent:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyinstaller

      - name: Build VisionLOLAgent
        run: pyinstaller VisionLOLAgent.spec

      - name: Verify output
        run: |
          if (Test-Path "dist/VisionLOLAgent.exe") {
            $size = (Get-Item "dist/VisionLOLAgent.exe").length / 1MB
            Write-Host "VisionLOLAgent.exe gerado — $([math]::Round($size,1)) MB"
          } else {
            Write-Error "Build falhou: VisionLOLAgent.exe não encontrado"
            exit 1
          }

      - name: Upload Agent como asset da release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VisionLOLAgent.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Agent artefato (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: VisionLOLAgent-exe
          path: dist/VisionLOLAgent.exe
          retention-days: 7
